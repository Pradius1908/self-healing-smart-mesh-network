<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32 Mesh Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .header { background: #1e1e1e; padding: 20px; border-radius: 8px; text-align: center; border-bottom: 3px solid #3498db; position: relative;}
        .emergency-active { border-bottom: 3px solid #e74c3c; background: #2c1616; color: #e74c3c; }
        
        #connect-btn { position: absolute; right: 20px; top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #connect-btn:hover { background: #2980b9; }
        
        .container { display: flex; gap: 20px; margin-top: 20px; }
        
        /* Node Status Panel Styles */
        .status-panel { background: #1e1e1e; padding: 20px; border-radius: 8px; flex: 0.3; }
        .node-card { padding: 15px; margin-bottom: 10px; border-radius: 6px; background: #2a2a2a; display: flex; justify-content: space-between; align-items: center;}
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        .online { background-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .offline { background-color: #e74c3c; opacity: 0.5; }

        /* Terminal Styles */
        .terminal { background: #1e1e1e; padding: 20px; border-radius: 8px; flex: 0.7; height: 60vh; overflow-y: auto; }
        .log-entry { padding: 10px; border-bottom: 1px solid #333; font-family: monospace; font-size: 14px; }
        .log-routine { color: #3498db; }
        .log-ping { color: #888; }
        .log-emergency { color: #e74c3c; font-weight: bold; background: rgba(231, 76, 60, 0.1); }
        .log-restore { color: #f1c40f; }
    </style>
</head>
<body>

    <div id="header" class="header">
        <button id="connect-btn">🔌 Connect to Node E</button>
        <h1 id="main-title">🌐 Live Mesh Telemetry: NORMAL MODE</h1>
        <p>USB Tether Status: <span id="usb-status" style="color: #e74c3c;">Disconnected</span></p>
    </div>

    <div class="container">
        <div class="status-panel">
            <h3>📡 Network Nodes</h3>
            <div id="node-list">
                </div>
            <small style="color: #888; margin-top: 20px; display: block;">Nodes missing > 15s are marked offline.</small>
        </div>

        <div class="terminal" id="terminal">
            <h3>💻 Live Data Stream</h3>
            <div id="log-container"></div>
        </div>
    </div>

    <script>
        const logContainer = document.getElementById('log-container');
        const usbStatus = document.getElementById('usb-status');
        const header = document.getElementById('header');
        const mainTitle = document.getElementById('main-title');
        const connectBtn = document.getElementById('connect-btn');
        const nodeList = document.getElementById('node-list');

        // --- NODE TRACKING LOGIC ---
        const activeNodes = { 'A': 0, 'B': 0, 'C': 0, 'D': 0 }; // Store last seen timestamps
        const TIMEOUT_MS = 15000; // 15 seconds

        function updateNodeActivity(source) {
            if (activeNodes[source] !== undefined) {
                activeNodes[source] = Date.now();
            }
        }

        // Loop to update the UI every second
        setInterval(() => {
            nodeList.innerHTML = ''; // Clear list
            const now = Date.now();
            
            for (const [nodeId, lastSeen] of Object.entries(activeNodes)) {
                const isOnline = (now - lastSeen) < TIMEOUT_MS && lastSeen !== 0;
                
                const card = document.createElement('div');
                card.className = 'node-card';
                card.innerHTML = `
                    <strong>Node ${nodeId}</strong>
                    <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                `;
                nodeList.appendChild(card);
            }
        }, 1000);

        // --- SERIAL CONNECTION LOGIC ---
        connectBtn.addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                usbStatus.innerText = "Connected via USB";
                usbStatus.style.color = "#2ecc71";
                connectBtn.style.display = "none";

                const textDecoder = new TextDecoderStream();
                port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();

                let buffer = "";
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith('{') && line.endsWith('}')) {
                            try {
                                processData(JSON.parse(line));
                            } catch (e) {
                                console.error("JSON Parse Error:", e);
                            }
                        }
                    }
                }
            } catch (err) {
                alert("Failed to connect. Make sure Arduino IDE Serial Monitor is closed.");
            }
        });

        // --- DATA PROCESSING LOGIC ---
        function processData(data) {
            // Update node tracker whenever ANY message is received from a source
            if (data.source) updateNodeActivity(data.source);

            const entry = document.createElement('div');
            entry.classList.add('log-entry');

            if (data.type === "PING" || data.type === "PONG") {
                entry.classList.add('log-ping');
                entry.innerText = `[HEARTBEAT] Signal received from Node ${data.source}`;
            } 
            else if (data.type === "EMERGENCY") {
                entry.classList.add('log-emergency');
                entry.innerText = `[SOS] URGENT from Node ${data.source}: ${data.payload}`;
                
                // Update Banner to Red
                header.classList.add('emergency-active');
                mainTitle.innerHTML = `🚨 Live Mesh Telemetry: EMERGENCY MODE (Node ${data.source})`;
            } 
            else if (data.type === "NORMAL_RESTORE") {
                entry.classList.add('log-restore');
                entry.innerText = `[RESTORE] ${data.payload}`;
                
                // Restore Banner to Blue
                header.classList.remove('emergency-active');
                mainTitle.innerHTML = `🌐 Live Mesh Telemetry: NORMAL MODE`;
            }
            else if (data.type === "SYSTEM") {
                entry.style.color = "#f1c40f";
                entry.innerText = `[SYS] ${data.payload}`;
            }
            else {
                entry.classList.add('log-routine');
                entry.innerText = `[MSG] Data from ${data.source} --> ${data.target}`;
            }

            logContainer.prepend(entry);
        }
    </script>
</body>
</html>
